<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="google-site-verification" content="DQUIdFZAN0yXz-YXVh9KbTCLxUuwwCsRwZI285GDb_g" />
    <title>Contact Us - Touch and Move</title>
    <link rel="stylesheet" href="./assets/css/style.css?v=3" />
    <link rel="stylesheet" href="./assets/css/shared.css?v=3" />
    <link rel="stylesheet" href="./assets/css/pages/contact.css?v=3" />
  </head>
  <body class="tm-warm-theme bg-black antialiased text-slate-300">
    <main>
      <section class="max-w-[1680px] mx-auto px-4 md:px-6 lg:px-8 py-32 bg-black">
        <div class="grid lg:grid-cols-2 gap-24">
          <div class="space-y-16">
            <div>
              <h3 class="text-4xl serif-heading mb-6 text-slate-800 italic">Get in Touch</h3>
              <p class="text-slate-500 font-light leading-relaxed max-w-md">
                Begin your journey towards holistic movement and spiritual alignment.
              </p>
            </div>
          </div>
          <div class="bg-[#fbf8f1] border border-white/10 p-10 md:p-14">
            <h3 class="text-2xl serif-heading italic mb-10 text-slate-800">Send a Message</h3>
            <form id="contactForm" class="space-y-8" accept-charset="UTF-8" method="post" novalidate>
              <input type="hidden" name="formType" value="contact" />
              <input type="hidden" name="formStartedAt" value="" />
              
              <div class="space-y-3">
                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Full Name</label>
                <input
                  class="w-full bg-black border border-white/10 px-4 py-4 focus:outline-none focus:border-primary transition-all text-slate-800 font-light placeholder:text-slate-400"
                  placeholder="Your Name"
                  type="text"
                  name="name"
                  autocomplete="name"
                  minlength="2"
                  maxlength="120"
                  required
                />
              </div>
              
              <div class="space-y-3">
                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Email Address</label>
                <input
                  class="w-full bg-black border border-white/10 px-4 py-4 focus:outline-none focus:border-primary transition-all text-slate-800 font-light placeholder:text-slate-400"
                  placeholder="email@address.com"
                  type="email"
                  name="email"
                  autocomplete="email"
                  maxlength="180"
                  required
                />
              </div>
              
              <div class="space-y-3">
                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Phone Number</label>
                <input
                  class="w-full bg-black border border-white/10 px-4 py-4 focus:outline-none focus:border-primary transition-all text-slate-800 font-light placeholder:text-slate-400"
                  placeholder="+91 9511246401"
                  type="tel"
                  name="phone"
                  autocomplete="tel"
                  inputmode="tel"
                  pattern="[0-9+\-\s()]{7,20}"
                  title="Please enter a valid phone number."
                  maxlength="40"
                  required
                />
              </div>
              
              <div class="space-y-3">
                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Message</label>
                <textarea
                  class="w-full bg-black border border-white/10 px-4 py-4 focus:outline-none focus:border-primary transition-all text-slate-800 font-light resize-none placeholder:text-slate-400"
                  placeholder="Tell us about your journey..."
                  rows="5"
                  name="message"
                  minlength="10"
                  maxlength="5000"
                  required
                ></textarea>
              </div>
              
              <button
                id="contactSubmitButton"
                class="w-full bg-primary hover:bg-[#A00000] text-white py-5 font-bold uppercase text-[11px] tracking-[0.3em] transition-all flex items-center justify-center gap-3"
                type="submit"
              >
                <span>Send Message</span>
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script src="./assets/vendor/lenis.min.js" defer></script>
    <script src="./assets/js/main.js?v=20" defer></script>
    <script>
      function showToastMessage(message, isSuccess = true) {
        const toast = document.createElement('div');
        toast.style.cssText = `
          position: fixed;
          top: 20px;
          right: 20px;
          z-index: 10050;
          background: ${isSuccess ? '#22c55e' : '#ef4444'};
          color: white;
          padding: 16px 24px;
          border-radius: 12px;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
          font-size: 14px;
          font-weight: 500;
          max-width: 350px;
          word-wrap: break-word;
          animation: slideIn 0.3s ease-out;
        `;
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
          toast.style.animation = 'slideOut 0.3s ease-out';
          setTimeout(() => toast.remove(), 300);
        }, 4000);
      }
      
      const style = document.createElement('style');
      style.textContent = `
        @keyframes slideIn {
          from { transform: translateX(400px); opacity: 0; }
          to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
          from { transform: translateX(0); opacity: 1; }
          to { transform: translateX(400px); opacity: 0; }
        }
        @media (max-width: 640px) {
          .toast-mobile { top: auto !important; right: 10px !important; bottom: 10px !important; left: 10px !important; }
        }
      `;
      document.head.appendChild(style);

      document.addEventListener('DOMContentLoaded', () => {
        const contactForm = document.getElementById('contactForm');
        const submitButton = document.getElementById('contactSubmitButton');
        const startedAtField = contactForm?.querySelector('input[name="formStartedAt"]');

        if (startedAtField) {
          startedAtField.value = String(Date.now());
        }

        contactForm.addEventListener('submit', async (event) => {
          event.preventDefault();

          if (!contactForm.reportValidity()) return;

          const payload = Object.fromEntries(new FormData(contactForm).entries());
          const originalButtonText = submitButton.innerHTML;

          submitButton.disabled = true;
          submitButton.innerHTML = '<span>Sending...</span>';

          try {
            const response = await fetch('/.netlify/functions/contact', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });

            const result = await response.json();

            if (!response.ok || !result.ok) {
              throw new Error(result.message || 'Unable to send message.');
            }

            contactForm.reset();
            if (startedAtField) {
              startedAtField.value = String(Date.now());
            }
            
            showToastMessage('✅ Your message has been sent successfully! We will get back to you soon.', true);
          } catch (error) {
            showToastMessage('❌ ' + (error.message || 'We could not send your message right now. Please try again.'), false);
          } finally {
            submitButton.disabled = false;
            submitButton.innerHTML = originalButtonText;
          }
        });
      });
    </script>
  </body>
</html>
